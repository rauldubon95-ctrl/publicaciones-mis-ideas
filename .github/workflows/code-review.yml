name: Agente Revisor de Código

on:
  pull_request:
    types: [opened, synchronize]
    paths:
      - "**/*.ts"
      - "**/*.tsx"
      - "**/*.js"
      - "**/*.mjs"
  schedule:
    # Lunes 8:00 AM UTC (revisión semanal)
    - cron: "0 8 * * 1"
  workflow_dispatch:

permissions:
  issues: write
  contents: read
  models: read

jobs:
  revisar:
    name: Revisar código con IA
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Ejecutar agente revisor
        run: node .github/scripts/review.mjs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          PR_NUMBER: ${{ github.event.pull_request.number }}

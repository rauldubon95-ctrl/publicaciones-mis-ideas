name: Agente Priorizador de Mejoras

on:
  schedule:
    # Lunes 9:00 AM UTC (1 hora después del revisor)
    - cron: "0 9 * * 1"
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  priorizar:
    name: Priorizar mejoras pendientes
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Ejecutar agente priorizador
        run: node .github/scripts/prioritize.mjs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}

name: Deploy Cloudflare Worker

on:
  push:
    branches:
      - main
    paths:
      - "workers/sociologia/**"
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy sociologia worker
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: workers/sociologia

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: workers/sociologia/package.json

      - name: Install dependencies
        run: npm install

      - name: Verificar compilación TypeScript
        run: npx tsc --noEmit

      - name: Deploy a Cloudflare Workers
        run: npx wrangler deploy
        continue-on-error: true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

      - name: Estado del deploy
        run: |
          echo "El deploy via GitHub Actions puede fallar si CF_API_TOKEN tiene restricción de IP."
          echo "El deploy real lo maneja la integración Git de Cloudflare automáticamente."
          echo "La verificación TypeScript (paso anterior) confirma que el código compila correctamente."

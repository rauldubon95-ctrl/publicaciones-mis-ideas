# Dependabot — el "vigilante de piezas viejas".
# Cada mes revisa si hay versiones nuevas de las dependencias y abre un Pull
# Request en GitHub con el cambio. Tú lo ves, lo revisamos juntos siguiendo
# docs/playbook-actualizacion-dependencias.md y lo mergeamos solo si pasa
# (tsc + build + prueba en Preview). Agrupa parches/menores en un solo PR para
# no llenarte de notificaciones.
#
# Los saltos "mayores" (semver-major, p. ej. Next 15→16 o Tailwind 3→4) NO se
# proponen automáticamente: suelen romper el build y se hacen a mano en una
# sesión dedicada. Por eso cada ecosistema npm los ignora abajo.
version: 2
updates:
  # La web (Next.js, Prisma, etc.)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps"
    # Cooldown anti-supply-chain: espera 7 días desde que se publica una versión
    # antes de proponerla. El malware npm suele detectarse y retirarse en
    # horas/días; esto evita ser el conejillo de indias de una versión recién
    # secuestrada.
    cooldown:
      default-days: 7
    groups:
      menores-y-parches:
        update-types: ["minor", "patch"]
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # El Worker del asistente de IA (tiene sus propias dependencias)
  - package-ecosystem: "npm"
    directory: "/workers/sociologia"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps(worker)"
    cooldown:
      default-days: 7
    groups:
      menores-y-parches:
        update-types: ["minor", "patch"]
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # Las GitHub Actions (los flujos automáticos del repo)
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    commit-message:
      prefix: "ci"
